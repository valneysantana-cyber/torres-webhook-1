<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TorresGuest ГўВҖВ” HГғВіspedes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
    }

    /* ГўВ”ВҖГўВ”ВҖ HEADER ГўВ”ВҖГўВ”ВҖ */
    .header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-icon { font-size: 28px; }
    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f0f0f0;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 12px;
      color: #888;
    }

    /* ГўВ”ВҖГўВ”ВҖ STATS BAR ГўВ”ВҖГўВ”ВҖ */
    .stats-bar {
      background: #161616;
      border-bottom: 1px solid #222;
      padding: 10px 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #222;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      white-space: nowrap;
    }
    .stat-chip .stat-num {
      font-weight: 700;
      font-size: 14px;
      color: #d4a017;
    }
    .stat-chip .stat-label { color: #aaa; }
    .stat-chip.total { border-color: #d4a017; }
    .stat-chip.total .stat-num { color: #d4a017; }
    .stat-chip.embaixador .stat-num { color: #9b59b6; }
    .stat-chip.vip .stat-num { color: #e74c3c; }
    .stat-chip.frequente .stat-num { color: #3498db; }
    .stat-chip.visitante .stat-num { color: #27ae60; }

    /* ГўВ”ВҖГўВ”ВҖ MAIN CONTAINER ГўВ”ВҖГўВ”ВҖ */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ГўВ”ВҖГўВ”ВҖ SEARCH BOX ГўВ”ВҖГўВ”ВҖ */
    .search-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .search-wrap input {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e8e8e8;
      font-size: 15px;
      padding: 12px 44px 12px 16px;
      outline: none;
      transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: #d4a017; }
    .search-wrap input::placeholder { color: #555; }
    .search-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
    }

    /* ГўВ”ВҖГўВ”ВҖ RESULTS LIST ГўВ”ВҖГўВ”ВҖ */
    #results { display: flex; flex-direction: column; gap: 10px; }

    /* ГўВ”ВҖГўВ”ВҖ GUEST CARD ГўВ”ВҖГўВ”ВҖ */
    .guest-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .guest-card:hover { border-color: #444; background: #1f1f1f; }
    .guest-card.selected { border-color: #d4a017; background: #1d1a0f; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .card-name {
      font-size: 16px;
      font-weight: 600;
      color: #f0f0f0;
    }
    .card-level {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 12px;
      white-space: nowrap;
    }
    .level-Embaixador { background: #2d1a3d; color: #c39bd3; border: 1px solid #7d3c98; }
    .level-VIP        { background: #3d1a1a; color: #f1948a; border: 1px solid #cb4335; }
    .level-Frequente  { background: #1a2a3d; color: #7fb3d3; border: 1px solid #2874a6; }
    .level-Visitante  { background: #1a2d1a; color: #7dcea0; border: 1px solid #1e8449; }

    .card-phone {
      font-size: 13px;
      color: #d4a017;
      margin-bottom: 8px;
      text-decoration: none;
    }
    .card-phone:hover { text-decoration: underline; }

    .card-meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .meta-label {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .meta-value {
      font-size: 13px;
      font-weight: 500;
      color: #ccc;
    }

    .card-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: #555;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      display: none;
    }
    .card-close:hover { color: #e74c3c; background: #2a0000; }
    .guest-card.selected .card-close { display: block; }

    /* ГўВ”ВҖГўВ”ВҖ DETAIL PANEL ГўВ”ВҖГўВ”ВҖ */
    #detail {
      margin-top: 12px;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
      display: none;
    }
    #detail.visible { display: block; }

    /* ГўВ”ВҖГўВ”ВҖ TABS ГўВ”ВҖГўВ”ВҖ */
    .tabs {
      display: flex;
      border-bottom: 1px solid #2a2a2a;
      background: #1a1a1a;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: #888;
      font-size: 13px;
      font-weight: 500;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .tab-btn:hover { color: #ccc; }
    .tab-btn.active {
      color: #d4a017;
      border-bottom-color: #d4a017;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ГўВ”ВҖГўВ”ВҖ PROFILE TAB ГўВ”ВҖГўВ”ВҖ */
    .profile-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0;
      padding: 4px 0;
    }
    .profile-row {
      display: contents;
    }
    .profile-row .pf-label,
    .profile-row .pf-value {
      padding: 9px 16px;
      font-size: 13px;
      border-bottom: 1px solid #1e1e1e;
    }
    .profile-row:last-child .pf-label,
    .profile-row:last-child .pf-value {
      border-bottom: none;
    }
    .pf-label {
      color: #777;
      font-weight: 500;
      white-space: nowrap;
      padding-right: 24px;
    }
    .pf-value {
      color: #e0e0e0;
      word-break: break-word;
    }
    .pf-value.level-badge {
      display: flex;
      align-items: center;
    }
    .pf-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px 16px;
    }
    .tag {
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      color: #aaa;
    }
    .notes-box {
      padding: 12px 16px;
      font-size: 13px;
      color: #ccc;
      line-height: 1.5;
      border-top: 1px solid #1e1e1e;
    }

    /* ГўВ”ВҖГўВ”ВҖ MESSAGES TAB ГўВ”ВҖГўВ”ВҖ */
    .messages-wrap {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 420px;
      overflow-y: auto;
    }
    .messages-wrap::-webkit-scrollbar { width: 4px; }
    .messages-wrap::-webkit-scrollbar-track { background: transparent; }
    .messages-wrap::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }
    .msg.user { align-self: flex-start; }
    .msg.assistant { align-self: flex-end; }

    .msg-role {
      font-size: 10px;
      color: #666;
      margin-bottom: 3px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .msg.user .msg-role { padding-left: 4px; }
    .msg.assistant .msg-role { text-align: right; padding-right: 4px; color: #c9a227; }

    .msg-bubble {
      padding: 9px 13px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .msg.user .msg-bubble {
      background: #222;
      border: 1px solid #333;
      border-bottom-left-radius: 4px;
      color: #ddd;
    }
    .msg.assistant .msg-bubble {
      background: #1d2a1a;
      border: 1px solid #2a4020;
      border-bottom-right-radius: 4px;
      color: #d4e8c8;
    }

    .no-msgs {
      text-align: center;
      color: #555;
      font-size: 13px;
      padding: 32px 16px;
    }

    /* ГўВ”ВҖГўВ”ВҖ KEY PROMPT (hidden by default) ГўВ”ВҖГўВ”ВҖ */
    #key-prompt {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    .key-box {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 28px;
      width: 320px;
    }
    .key-box h2 { font-size: 16px; margin-bottom: 8px; }
    .key-box p  { font-size: 13px; color: #888; margin-bottom: 16px; }
    .key-box input {
      width: 100%;
      background: #111;
      border: 1px solid #444;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 13px;
      padding: 10px 12px;
      margin-bottom: 12px;
      outline: none;
    }
    .key-box button {
      width: 100%;
      background: #d4a017;
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 14px;
      font-weight: 600;
      padding: 10px;
      cursor: pointer;
    }
    .key-box button:hover { background: #c49010; }

    /* ГўВ”ВҖГўВ”ВҖ LOADING ГўВ”ВҖГўВ”ВҖ */
    .loading {
      text-align: center;
      color: #555;
      font-size: 13px;
      padding: 20px;
    }

    /* ГўВ”ВҖГўВ”ВҖ EMPTY STATE ГўВ”ВҖГўВ”ВҖ */
    .empty {
      text-align: center;
      color: #555;
      font-size: 13px;
      padding: 32px 16px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-icon">Г°ВҹВҸВЁ</div>
    <div class="header-text">
      <h1>TorresGuest ГўВҖВ” HГғВіspedes</h1>
      <p>Painel de pesquisa ГӮВ· CRM</p>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-chip total">
      <span class="stat-num" id="stat-total">ГўВҖВ”</span>
      <span class="stat-label">HГғВіspedes</span>
    </div>
    <div class="stat-chip embaixador">
      <span class="stat-num" id="stat-embaixador">ГўВҖВ”</span>
      <span class="stat-label">Embaixadores</span>
    </div>
    <div class="stat-chip vip">
      <span class="stat-num" id="stat-vip">ГўВҖВ”</span>
      <span class="stat-label">VIPs</span>
    </div>
    <div class="stat-chip frequente">
      <span class="stat-num" id="stat-frequente">ГўВҖВ”</span>
      <span class="stat-label">Frequentes</span>
    </div>
    <div class="stat-chip visitante">
      <span class="stat-num" id="stat-visitante">ГўВҖВ”</span>
      <span class="stat-label">Visitantes</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="container">

    <!-- SEARCH -->
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Buscar hГғВіspede por nome ou telefone..." autocomplete="off">
      <span class="search-icon">Г°ВҹВ”ВҚ</span>
    </div>

    <!-- RESULTS -->
    <div id="results"></div>

    <!-- DETAIL PANEL -->
    <div id="detail">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('profile')" id="tab-profile">Г°ВҹВҳВҠ Perfil</button>
        <button class="tab-btn" onclick="switchTab('messages')" id="tab-messages">Г°ВҹВ’В¬ Mensagens</button>
      </div>
      <div class="tab-content active" id="pane-profile">
        <div class="loading">Carregando...</div>
      </div>
      <div class="tab-content" id="pane-messages">
        <div class="loading">Carregando...</div>
      </div>
    </div>

  </div>

  <!-- API KEY PROMPT (fallback) -->
  <div id="key-prompt">
    <div class="key-box">
      <h2>Г°ВҹВ”В‘ API Key</h2>
      <p>Insira a chave de acesso ao CRM:</p>
      <input type="password" id="key-input" placeholder="API Key">
      <button onclick="saveKey()">Entrar</button>
    </div>
  </div>

<script>
  const BASE = window.location.origin;
  let apiKey = localStorage.getItem('crm_api_key') || '34e8ff412a7dc1bd47acf66ef24e968bec585ff589024d99';
  let selectedPhone = null;
  let searchTimer = null;

  const headers = () => ({ 'x-api-key': apiKey });

  // ГўВ”ВҖГўВ”ВҖ API KEY ГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖ
  if (!apiKey) {
    document.getElementById('key-prompt').style.display = 'flex';
  } else {
    init();
  }

  function saveKey() {
    const val = document.getElementById('key-input').value.trim();
    if (!val) return;
    apiKey = val;
    localStorage.setItem('crm_api_key', val);
    document.getElementById('key-prompt').style.display = 'none';
    init();
  }

  // ГўВ”ВҖГўВ”ВҖ INIT ГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖ
  function init() {
    loadStats();
    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => doSearch(e.target.value.trim()), 350);
    });
  }

  // ГўВ”ВҖГўВ”ВҖ STATS ГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖ
  async function loadStats() {
    try {
      const r = await fetch(BASE + '/guests/stats', { headers: headers() });
      if (!r.ok) return;
      const d = await r.json();
      // Support multiple field name conventions
      document.getElementById('stat-total').textContent     = d.total ?? d.Total ?? '0';
      document.getElementById('stat-embaixador').textContent = d.Embaixador ?? d.embaixador ?? d.ambassador ?? '0';
      document.getElementById('stat-vip').textContent        = d.VIP ?? d.vip ?? '0';
      document.getElementById('stat-frequente').textContent  = d.Frequente ?? d.frequente ?? '0';
      document.getElementById('stat-visitante').textContent  = d.Visitante ?? d.visitante ?? '0';
    } catch(e) {
      console.warn('Stats error:', e);
    }
  }

  // ГўВ”ВҖГўВ”ВҖ SEARCH ГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖ
  async function doSearch(q) {
    const el = document.getElementById('results');
    if (!q || q.length < 2) {
      el.innerHTML = '';
      closeDetail();
      return;
    }
    el.innerHTML = '<div class="loading">Buscando...</div>';
    try {
      const r = await fetch(`${BASE}/guests/search?q=${encodeURIComponent(q)}`, { headers: headers() });
      const guests = await r.json();
      if (!Array.isArray(guests) || guests.length === 0) {
        el.innerHTML = '<div class="empty">Nenhum hГғВіspede encontrado.</div>';
        return;
      }
      el.innerHTML = guests.map(g => buildCard(g)).join('');
    } catch(e) {
      el.innerHTML = '<div class="empty">Erro ao buscar hГғВіspedes.</div>';
    }
  }

  // ГўВ”ВҖГўВ”ВҖ BUILD CARD ГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖ
  function buildCard(g) {
    const phone   = g.phone || '';
    const name    = g.name || phone;
    const apt     = g.preferredApartment || g.apartment || g.apt || 'ГўВҖВ”';
    const stays   = g.totalStays ?? g.stays ?? 'ГўВҖВ”';
    const nights  = g.totalNights ?? g.nights ?? 'ГўВҖВ”';
    const checkout= g.lastCheckout || g.checkout || 'ГўВҖВ”';
    const level   = g.level || 'Visitante';
    const levelClass = 'level-' + level;

    return `
      <div class="guest-card" id="card-${phone}" onclick="selectGuest('${phone}', event)">
        <button class="card-close" onclick="closeCard(event)" title="Fechar">ГўВңВ•</button>
        <div class="card-top">
          <span class="card-name">${esc(name)}</span>
          <span class="card-level ${levelClass}">${esc(level)}</span>
        </div>
        <a class="card-phone" href="https://wa.me/${phone}" target="_blank" onclick="event.stopPropagation()">
          Г°ВҹВ“Вһ ${formatPhone(phone)}
        </a>
        <div class="card-meta">
          <div class="meta-item">
            <span class="meta-label">Apartamento</span>
            <span class="meta-value">${esc(apt)}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Estadias</span>
            <span class="meta-value">${stays}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Noites</span>
            <span class="meta-value">${nights}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">ГғВҡltimo checkout</span>
            <span class="meta-value">${esc(checkout)}</span>
          </div>
        </div>
      </div>`;
  }

  // ГўВ”ВҖГўВ”ВҖ SELECT GUEST ГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖ
  async function selectGuest(phone, event) {
    if (event && event.target.classList.contains('card-close')) return;
    if (selectedPhone === phone) return;

    // Deselect previous
    if (selectedPhone) {
      const prev = document.getElementById('card-' + selectedPhone);
      if (prev) prev.classList.remove('selected');
    }
    selectedPhone = phone;
    const card = document.getElementById('card-' + phone);
    if (card) card.classList.add('selected');

    // Show detail panel
    const detail = document.getElementById('detail');
    detail.classList.add('visible');

    // Set loading state
    document.getElementById('pane-profile').innerHTML  = '<div class="loading">Carregando perfil...</div>';
    document.getElementById('pane-messages').innerHTML = '<div class="loading">Carregando mensagens...</div>';

    // Switch to profile tab
    switchTab('profile');

    // Fetch in parallel
    loadProfile(phone);
    loadMessages(phone);

    // Scroll to detail
    setTimeout(() => detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
  }

  function closeCard(event) {
    event.stopPropagation();
    closeDetail();
  }

  function closeDetail() {
    if (selectedPhone) {
      const card = document.getElementById('card-' + selectedPhone);
      if (card) card.classList.remove('selected');
      selectedPhone = null;
    }
    document.getElementById('detail').classList.remove('visible');
  }

  // ГўВ”ВҖГўВ”ВҖ TABS ГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖ
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('pane-' + tab).classList.add('active');
  }

  // ГўВ”ВҖГўВ”ВҖ PROFILE ГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖ
  async function loadProfile(phone) {
    try {
      const r = await fetch(`${BASE}/guest/${phone}/profile`, { headers: headers() });
      if (!r.ok) {
        document.getElementById('pane-profile').innerHTML = '<div class="empty">Perfil nГғВЈo encontrado.</div>';
        return;
      }
      const p = await r.json();
      renderProfile(p, phone);
    } catch(e) {
      document.getElementById('pane-profile').innerHTML = '<div class="empty">Erro ao carregar perfil.</div>';
    }
  }

  function renderProfile(p, phone) {
    const level   = p.level || 'Visitante';
    const levelClass = 'level-' + level;
    const rows = [
      ['Telefone',        formatPhone(p.phone || phone)],
      ['Nome',            p.name || 'ГўВҖВ”'],
      ['Apartamento',     p.preferredApartment || p.apartment || 'ГўВҖВ”'],
      ['Total Estadias',  p.totalStays ?? 'ГўВҖВ”'],
      ['Noites',          p.totalNights ?? 'ГўВҖВ”'],
      ['Primeiro Check-in', p.firstCheckin || 'ГўВҖВ”'],
      ['ГғВҡltimo Checkout', p.lastCheckout || p.checkout || 'ГўВҖВ”'],
      ['NГғВӯvel',           `<span class="card-level ${levelClass}">${esc(level)}</span>`],
      ['Canal',           p.channel || 'WhatsApp'],
    ];

    let html = '<div class="profile-grid">';
    rows.forEach(([label, value]) => {
      html += `<div class="profile-row">
        <div class="pf-label">${label}</div>
        <div class="pf-value">${typeof value === 'string' && value.startsWith('<') ? value : esc(String(value))}</div>
      </div>`;
    });
    html += '</div>';

    // Tags
    const tags = p.tags || [];
    if (tags.length > 0) {
      html += `<div class="pf-tags">${tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>`;
    }

    // Notes
    if (p.notes) {
      html += `<div class="notes-box">Г°ВҹВ“Вқ ${esc(p.notes)}</div>`;
    }

    document.getElementById('pane-profile').innerHTML = html;
  }

  // ГўВ”ВҖГўВ”ВҖ MESSAGES ГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖ
  async function loadMessages(phone) {
    try {
      const r = await fetch(`${BASE}/guest/${phone}/context`, { headers: headers() });
      if (!r.ok) {
        document.getElementById('pane-messages').innerHTML = '<div class="no-msgs">Sem mensagens registradas.</div>';
        return;
      }
      const msgs = await r.json();
      renderMessages(msgs);
    } catch(e) {
      document.getElementById('pane-messages').innerHTML = '<div class="no-msgs">Erro ao carregar mensagens.</div>';
    }
  }

  function renderMessages(msgs) {
    if (!Array.isArray(msgs) || msgs.length === 0) {
      document.getElementById('pane-messages').innerHTML = '<div class="no-msgs">Sem mensagens registradas.</div>';
      return;
    }

    const html = msgs.map(m => {
      const role = m.role || 'user';
      // Normalize roles
      const isBot = role === 'assistant' || role === 'bot' || role === 'Bot';
      const cssRole = isBot ? 'assistant' : 'user';
      const roleLabel = isBot ? 'Г°ВҹВӨВ– Bot' : 'Г°ВҹВ‘ВӨ HГғВіspede';
      const content = m.content || m.text || '';

      return `<div class="msg ${cssRole}">
        <div class="msg-role">${roleLabel}</div>
        <div class="msg-bubble">${esc(content)}</div>
      </div>`;
    }).join('');

    document.getElementById('pane-messages').innerHTML = `<div class="messages-wrap">${html}</div>`;

    // Scroll to bottom
    const wrap = document.querySelector('.messages-wrap');
    if (wrap) wrap.scrollTop = wrap.scrollHeight;
  }

  // ГўВ”ВҖГўВ”ВҖ HELPERS ГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖГўВ”ВҖ
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatPhone(phone) {
    const p = String(phone).replace(/\D/g, '');
    if (p.length === 13) {
      // 55 + 2-digit DDD + 9-digit number
      return `+${p.slice(0,2)} (${p.slice(2,4)}) ${p.slice(4,9)}-${p.slice(9)}`;
    }
    return phone;
  }
</script>
</body>
</html>
