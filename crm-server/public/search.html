<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TorresGuest — Hóspedes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 14px 24px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  .header-icon { font-size: 28px; }
  .header-title { font-size: 18px; font-weight: 700; color: #f0f6fc; }
  .header-sub { font-size: 12px; color: #8b909e; }

  /* STATS BAR */
  #stats-bar { display: none; gap: 24px; padding: 12px 24px; background: #0d1117; border-bottom: 1px solid #21262d; }
  .stat { text-align: center; font-size: 12px; color: #8b949e; }
  .stat span { display: block; font-size: 22px; font-weight: 700; color: #f0f6fc; }

  /* SEARCH */
  .search-wrap { max-width: 780px; margin: 32px auto 0; padding: 0 16px; }
  .search-input-wrap { position: relative; }
  #q { width: 100%; padding: 14px 48px 14px 18px; font-size: 16px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; color: #f0f6fc; outline: none; transition: border 0.2s; }
  #q:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
  .search-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #8b949e; font-size: 18px; pointer-events: none; }

  #hint { text-align: center; color: #8b949e; margin-top: 24px; font-size: 14px; }

  /* CARDS */
  #results { max-width: 780px; margin: 16px auto 80px; padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 18px 20px; display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .card:hover { border-color: #58a6ff; background: #1c2230; }
  .card-name { font-size: 17px; font-weight: 600; color: #f0f6fc; margin-bottom: 4px; }
  .card-phone { font-size: 13px; margin-bottom: 10px; }
  .card-phone a { color: #58a6ff; text-decoration: none; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 3px 8px; font-size: 12px; color: #8b949e; }
  .card-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .card-nights { font-size: 28px; font-weight: 700; color: #f0f6fc; line-height: 1; }
  .card-nights-label { font-size: 11px; color: #8b949e; }

  /* BADGES */
  .badge { border-radius: 20px; padding: 3px 12px; font-size: 11px; font-weight: 700; letter-spacing: .5px; }
  .badge-visitante  { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
  .badge-frequente  { background: #1a3a5c; color: #58a6ff; border: 1px solid #1f6feb; }
  .badge-vip        { background: #2d1d4e; color: #d2a8ff; border: 1px solid #6e40c9; }
  .badge-embaixador { background: #3d2000; color: #e3b341; border: 1px solid #9e6a03; }

  .loading { text-align: center; color: #8b949e; padding: 40px; }
  .empty { text-align: center; color: #8b949e; padding: 60px 20px; }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }

  /* API KEY PROMPT */
  #key-prompt { display: none; position: fixed; bottom: 20px; right: 20px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 14px 16px; z-index: 100; display: none; align-items: center; gap: 10px; }
  #key-prompt label { font-size: 13px; color: #8b949e; white-space: nowrap; }
  #api-key-input { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #f0f6fc; padding: 6px 10px; font-size: 13px; width: 160px; outline: none; }
  #api-key-input:focus { border-color: #58a6ff; }
  #key-prompt button { background: #238636; border: none; color: #fff; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; }

  /* ─── PAINEL LATERAL DE MENSAGENS ─── */
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; }
  #panel { position: fixed; top: 0; right: -520px; width: 500px; max-width: 95vw; height: 100vh; background: #161b22; border-left: 1px solid #30363d; z-index: 201; display: flex; flex-direction: column; transition: right 0.28s cubic-bezier(.4,0,.2,1); }
  #panel.open { right: 0; }

  .panel-header { padding: 18px 20px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; }
  .panel-close { background: none; border: none; color: #8b949e; font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px; }
  .panel-close:hover { color: #f0f6fc; }
  .panel-guest-name { font-size: 16px; font-weight: 700; color: #f0f6fc; flex: 1; }
  .panel-phone { font-size: 12px; color: #8b949e; }

  .panel-tabs { display: flex; border-bottom: 1px solid #30363d; }
  .tab-btn { flex: 1; padding: 11px; background: none; border: none; color: #8b949e; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
  .tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }
  .tab-btn:hover { color: #c9d1d9; }

  /* Tab: Perfil */
  #tab-profile { flex: 1; overflow-y: auto; padding: 20px; display: none; flex-direction: column; gap: 14px; }
  #tab-profile.active { display: flex; }
  .profile-row { display: flex; justify-content: space-between; wadding: 10px 0; border-bottom: 1px solid #21262d; }
  .profile-label { font-size: 13px; color: #8b949e; }
  .profile-value { font-size: 13px; color: #f0f6fc; font-weight: 600; text-align: right; }

  /* Tab: Mensagens */
  #tab-messages { flex: 1; overflow-y: auto; padding: 16px; display: none; flex-direction: column; gap: 10px; }
  #tab-messages.active { display: flex; }

  .msg-bubble { max-width: 82%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-break: break-word; }
  .msg-guest { align-self: flex-start; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; border-bottom-left-radius: 4px; }
  .msg-bot { align-self: flex-end; background: #1a3a5c; border: 1px solid #1f6feb; color: #cde7ff; border-bottom-right-radius: 4px; }
  .msg-time { font-size: 10px; color: #8b949e; margin-top: 4px; display: block; }
  .msg-role { font-size: 10px; font-weight: 700; margin-bottom: 4px; display: block; }
  .msg-role.guest { color: #8b949e; }
  .msg-role.bot { color: #58a6ff; text-align: right; }

  .no-msgs { text-align: center; color: #8b949e; padding: 60px 20px; font-size: 14px; }
  .panel-loading { text-align: center; color: #8b949e; padding: 40px; font-size: 14px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏨</div>
  <div>
    <div class="header-title">TorresGuest — Hóspedes</div>
    <div class="header-sub">Painel de pesquisa · CRM</div>
  </div>
</div>

<div id="stats-bar"></div>

<div class="search-wrap">
  <div class="search-input-wrap">
    <input id="q" type="text" placeholder="Pesquisar por nome do hóspede..." autocomplete="off">
    <span class="search-icon">🔍<span>
  </div>
</div>

<div id="hint">Digite pelo menos 2 letras para pesquisar</div>
<div id="results"></div>

<!-- API Key prompt -->
<div id="key-prompt" style="display:none; position:fixed; bottom:20px; right:20px; background:#161b22; border:1px solid #30363d; border-radius:10px; padding:14px 16px; z-index:100; align-items:center; gap:10px;">
  <label>API Key:</label>
  <input id="api-key-input" type="text" placeholder="x-api-key">
  <button onclick="saveKey()">OK</button>
</div>

<!-- Overlay -->
<div id="overlay" onclick="closePanel()"></div>

<!-- Painel lateral -->
<div id="panel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div style="flex:1">
      <div class="panel-guest-name" id="panel-name">—</div>
      <div class="panel-phone" id="panel-phone">—</div>
    </div>
    <span id="panel-badge"></span>
  </div>

  <div class="panel-tabs">
    <button class="tab-btn active" id="btn-profile" onclick="switchTab('profile')">🤤 Perfil</button>
    <button class="tab-btn" id="btn-messages" onclick="switchTab('messages')">🐬 Mensagens</button>
  </div>

  <div id="tab-profile" class="active"></div>
  <div id="tab-messages"></div>
</div>

<script>
const BASE = window.location.origin;
let apiKey = localStorage.getItem('crm_api_key') || '';
let timer = null;
let currentPhone = null;

if (!apiKey) document.getElementById('key-prompt').style.display = 'flex';

function saveKey() {
  apiKey = document.getElementById('api-key-input').value.trim();
  localStorage.setItem('crm_api_key', apiKey);
  document.getElementById('key-prompt').style.display = 'none';
  loadStats();
}

async function loadStats() {
  try {
    const r = await fetch(BASE + '/guests/stats', { headers: { 'x-api-key': apiKey } });
    if (!r.ok) return;
    const d = await r.json();
    const bar = document.getElementById('stats-bar');
    bar.style.display = 'flex';
    bar.innerHTML = `
      <div class="stat"><span>${d.total||0}</span>Hóspedes</div>
      <div class="stat"><span style="color:#e3b341">${d.Embaixador||0}</span>Embaixadores</div>
      <div class="stat"><span style="color:#d2a8ff">${d.VIP||0}</span>VIPs</div>
      <div class="stat"><span style="color:#58a6ff">${d.Frequente||0}</span>Frequentes</div>
      <div class="stat"><span>${d.Visitante||0}</span>Visitantes</div>
    `;
  } catch(e) {}
}

function levelBadge(level) {
  const map = { Visitante:'visitante', Frequente:'frequente', VIP:'vip', Embaixador:'embaixador' };
  const cls = map[level] || 'visitante';
  return `<span class="badge badge-${cls}">${level||'Visitante'}</span>`;
}

function renderCard(g) {
  const apts = (g.apartments||[]).join(', ') || g.preferredApartment || '-';
  const checkout = g.lastCheckout ? new Date(g.lastCheckout).toLocaleDateString('pt-BR') : '-';
  const channel = g.mainChannel ? `<span class="tag">${g.mainChannel}</span>` : '';
  const phone = g.phone ? `<a href="https://wa.me/${g.phone}" target="_blank" onclick="event.stopPropagation()" style="color:#58a6ff;text-decoration:none">${g.phone}</a>` : '-';
  return `
    <div class="card" onclick="openPanel(${JSON.stringify(g).replace(/"/g,'&quot;')})">
      <div class="card-left">
        <div class="card-name">${g.name||'Sem nome'}</div>
        <div class="card-phone">${phone}</div>
        <div class="card-meta">
          <span class="tag">Apt: <strong>${apts}</strong></span>
          <span class="tag">Estadias: <strong>${g.totalStays||0}</strong></span>
          <span class="tag">Noites: <strong>${g.totalNights||0}</strong></span>
          <span class="tag">Checkout: <strong>${checkout}</strong></span>
          ${channel}
        </div>
      </div>
      <div class="card-right">
        ${levelBadge(g.level)}
        <div>
          <div class="card-nights">${g.totalNights||0}</div>
          <div class="card-nights-label">noites</div>
        </div>
      </div>
    </div>
  `;
}

async function search(q) {
  const res = document.getElementById('results');
  const hint = document.getElementById('hint');
  if (q.length < 2) {
    res.innerHTML = '';
    hint.textContent = 'Digite pelo menos 2 letras para pesquisar';
    hint.style.display = 'block';
    return;
  }
  hint.style.display = 'none';
  res.innerHTML = '<div class="loading">Buscando...</div>';
  try {
    const r = await fetch(`${BASE}/guests/search?q=${encodeURIComponent(q)}`, { headers: { 'x-api-key': apiKey } });
    if (r.status === 401) {
      res.innerHTML = '<div class="empty"><div class="icon">Key</div>Informe a API Key abaixo</div>';
      document.getElementById('key-prompt').style.display='flex';
      return;
    }
    const guests = await r.json();
    if (!guests.length) {
      res.innerHTML = '<div class="empty"><div class="icon">?</div>Nenhum hospede encontrado</div>';
      return;
    }
    res.innerHTML = guests.map(renderCard).join('');
  } catch(ez) {
    res.innerHTML = '<div class="empty"><div class="icon">!</div>Erro ao conectar ao CRM</div>';
  }
}

// PAINEL LATEGAL

function openPanel(guest) {
  currentPhone = guest.phone;
  document.getElementById('panel-name').textContent = guest.name || 'Sem nome';
  document.getElementById('panel-phone').textContent = guest.phone || '-';
  document.getElementById('panel-badge').innerHTML = levelBadge(guest.level);

  const apts = (guest.apartments||[]).join(', ') || guest.preferredApartment || '-';
  const checkout = guest.lastCheckout ? new Date(guest.lastCheckout).toLocaleDateString('pt-BR') : '-';
  const checkin  = guest.firstCheckin  ? new Date(guest.firstCheckin).toLocaleDateString('pt-BR')  : '-';
  document.getElementById('tab-profile').innerHTML = `
    <div class="profile-row"><span class="profile-label">Telefone</span><span class="profile-value">${guest.phone||'-'}</span></div>
    <div class="profile-row"><span class="profile-label">Apartamentos</span><span class="profile-value">${apts}</span></div>
    <div class="profile-row"><span class="profile-label">Total Estadias</span><span class="profile-value">${guest.totalStays||0}</span></div>
    <div class="profile-row"><span class="profile-label">Noites</span><span class="profile-value">${guest.totalNights||0}</span></div>
    <div class="profile-row"><span class="profile-label">Primeiro Check-in</span><span class="profile-value">${checkin}</span></div>
    <div class="profile-row"><span class="profile-label">Checkout</span><span class="profile-value">${checkout}</span></div>
    <div class="profile-row"><span class="profile-label">Nlevel</span><span class="profile-value">${guest.level||'Visitante'}</span></div>
    <div class="profile-row"><span class="profile-label">Canal</span><span class="profile-value">${guest.mainChannel||'WhatsApp'}</span></div>
    ${guest.notes ? `<div class="profile-row"><span class="profile-label">Notas</span><span class="profile-value">${guest.notes}</span></div>` : ''}
  `;

  document.getElementById('overlay').style.display = 'block';
  document.getElementById('panel').classList.add('open');
  switchTab('profile');
}

function closePanel() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('panel').classList.remove('open');
  currentPhone = null;
}

function switchTab(tab) {
  document.getElementById('btn-profile').classList.toggle('active', tab === 'profile');
  document.getElementById('btn-messages').classList.toggle('active', tab === 'messages');
  document.getElementById('tab-profile').classList.toggle('active', tab === 'profile');
  document.getElementById('tab-messages').classList.toggle('active', tab === 'messages');
  if (tab === 'messages' && currentPhone) {
    loadMessages(currentPhone);
  }
}

async function loadMessages(phone) {
  const container = document.getElementById('tab-messages');
  container.innerHTML = '<div class="panel-loading">Carregando mensagens...</div>';
  try {
    const r = await fetch(`${BASE}/guest/${phone}/context`, { headers: { 'x-api-key': apiKey } });
    if (!r.ok) {
      container.innerHTML = '<div class="no-msgs">Erro ao carregar mensagens</span>';
      return;
    }
    const data = await r.json();
    const msgs = Array.isArray(data) ? data : (data.messages || data.context || []);
    if (!msgs.length) {
      container.innerHTML = '<div class="no-msgs">Nenhuma mensagem registrada ainda</div>';
      return;
    }
    container.innerHTML = msgs.map(msg => {
      const isBot = msg.role === 'assistant' || msg.role === 'bot' || msg.sender === 'bot';
      const text = msg.content || msg.text || msg.message || '';
      const ts = msg.timestamp || msg.createdAt || msg.date;
      const timeStr = ts ? new Date(ts).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';
      return `
        <div style="display:flex; flex-direction:column; align-items:${isBot?'flex-end':'flex-start'}">
          <span class="msg-role ${isBot?'bot':'guest'}">${isBot?'Bot':'Hospede'}</span>
          <div class="msg-bubble ${isBot?'msg-bot':'msg-guest'}">${escapeHtml(text)}</div>
          ${timeStr ? `<span class="msg-time" style="text-align:${isBot?'right':'left'}">${timeStr}</span>` : ''}
        </div>
      `;
    }).join('');
    container.scrollTop = container.scrollHeight;
  } catch(e) {
    container.innerHTML = '<div class="no-msgs">Erro de conexao</div>';
  }
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

document.getElementById('q').addEventListener('input', e => {
  clearTimeout(timer);
  timer = setTimeout(() => search(e.target.value.trim()), 350);
});

if (apiKey) loadStats();
</script>
</body>
</html>
