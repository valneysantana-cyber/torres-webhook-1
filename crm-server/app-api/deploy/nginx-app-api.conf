# nginx — bloco para a App API (/app/v1)
#
# IMPORTANTE: se o seu server block tiver `auth_basic` (proteção dos painéis /admin),
# o app NÃO pode passar por ela — ele usa JWT próprio. Adicione este location
# ANTES do `location /` e SEM auth_basic.
#
# Editar: /etc/nginx/sites-available/<seu-site>  (ou onde está o server do crm)
# Depois: nginx -t && systemctl reload nginx

location /app/v1/ {
    # sem auth_basic aqui — autenticação é via Bearer JWT na própria API
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 30m;   # fotos de vistoria em base64 / multipart
}

# Observação: se NÃO houver auth_basic no server, o `location /` já encaminha
# /app/v1 para a porta 3001 e este bloco é opcional (mas recomendado pelo
# client_max_body_size das fotos).
